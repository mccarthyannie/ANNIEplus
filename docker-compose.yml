services:
  database: 
    image: postgres:18.2-alpine3.22
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5
    container_name: annie_db
    ports:
      - "5432:5432"
    environment:
      - PGDATA=/var/lib/postgresql/data
    volumes:
      - annie_vol:/var/lib/postgresql/data
    env_file: 
      - .env

  api:
      depends_on:
        database:
          condition: service_healthy
      build: 
        context: .
        dockerfile: Annie_API/Dockerfile
      ports:
        - "7000:8080"
      env_file:
        - .env
      environment:
        - ConnectionStrings__DefaultConnection=Host=database;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
        - ASPNETCORE_URLS=http://+:8080
        - ASPNETCORE_HTTPS_PORT=0
        - ASPNETCORE_ENVIRONMENT=Development
        - jwtKey=${JWT_KEY}

        - Mail__From=${MAIL_FROM}
        - Mail__Name=${MAIL_NAME}
        - Mail__Smtp=${MAIL_SMTP}
        - Mail__Port=${MAIL_PORT}
        - Mail__Password=${MAIL_PASSWORD}

        - FrontendUrl=${FRONTEND_URL}
        
        - Admin__Email=${ADMIN_EMAIL}
        - Admin__Password=${ADMIN_PASSWORD}   


volumes:
  annie_vol:
    external: false