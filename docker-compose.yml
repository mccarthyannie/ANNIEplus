services:
  database: 
    image: postgres:18.2-alpine3.22
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5
    container_name: annie_db
    ports:
      - "5432:5432"
    environment:
      - PGDATA=/var/lib/postgresql/data
    volumes:
      - annie_vol:/var/lib/postgresql/data
    env_file: 
      - .env

  api:
      depends_on:
        database:
          condition: service_healthy
      build: ./Annie_API/.
      ports:
        - "7000:8080"
      env_file:
        - .env
      environment:
        - ConnectionStrings__DefaultConnection=Host=database;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
volumes:
  annie_vol:
    external: false